name: Release macOS

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app
        run: npm run tauri build

      - name: Sign DMG and patch latest.json
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"
          repo="Joey-Farah/Slippi-Ranked-Stats"

          dmg=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          echo "Signing: $dmg"
          npm run tauri -- signer sign --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password "" "$dmg"
          sig="${dmg}.sig"

          dmgName=$(basename "$dmg")
          encoded="${dmgName// /.}"
          url="https://github.com/$repo/releases/download/$tag/$encoded"
          sigContent=$(cat "$sig")

          # Wait for the Windows job to create the release, then upload the DMG
          for i in $(seq 1 10); do
            gh release upload "$tag" "$dmg" "$sig" --clobber && break
            echo "Release not ready, retrying in 30s... ($i/10)"
            sleep 30
          done

          # Download the Windows-generated latest.json and add macOS entries
          curl -sL "https://github.com/$repo/releases/download/$tag/latest.json" -o latest.json

          python3 -c "
          import json
          with open('latest.json') as f:
              data = json.load(f)
          entry = {'signature': '''$sigContent''', 'url': '$url'}
          data['platforms']['darwin-aarch64'] = entry
          data['platforms']['darwin-x86_64'] = entry
          with open('latest.json', 'w') as f:
              json.dump(data, f, indent=2)
          "

          gh release upload "$tag" latest.json --clobber
