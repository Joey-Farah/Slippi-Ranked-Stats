name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app
        run: npm run tauri build

      - name: Sign installer
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          exe=$(find src-tauri/target/release/bundle/nsis -name "*.exe" | head -1)
          echo "Signing: $exe"
          npm run tauri -- signer sign --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password "" "$exe"
          echo "EXE_PATH=$exe" >> $GITHUB_ENV
          echo "SIG_PATH=${exe}.sig" >> $GITHUB_ENV

      - name: Generate latest.json and create release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag     = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $exePath = $env:EXE_PATH
          $sigPath = $env:SIG_PATH
          $exeName = Split-Path $exePath -Leaf
          $sig     = (Get-Content $sigPath -Raw).Trim()
          $repo    = "Joey-Farah/Slippi-Ranked-Stats"
          $encoded = $exeName -replace ' ', '.'
          $url     = "https://github.com/$repo/releases/download/$tag/$encoded"
          $pubDate = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")

          # Extract the latest release section (everything before the first ---)
          $notesRaw = Get-Content release-notes.md -Raw
          $notes = ($notesRaw -split "`r?`n---")[0].Trim()
          # Strip the "## What's New in vX.X.X" heading line
          $notes = ($notes -split "`r?`n", 2)[1].Trim()

          $json = [ordered]@{
            version  = $version
            notes    = $notes
            pub_date = $pubDate
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $sig
                url       = $url
              }
            }
          } | ConvertTo-Json -Depth 5

          $json | Out-File -FilePath latest.json -Encoding utf8NoBOM

          Write-Host "=== latest.json ==="
          Write-Host $json

          $isPreRelease = $tag -match '-beta'
          $title = if ($isPreRelease) { "Beta: Slippi Ranked Stats $tag" } else { "Slippi Ranked Stats $tag" }
          $preReleaseFlag = if ($isPreRelease) { "--prerelease" } else { "" }

          gh release delete $tag --yes 2>$null
          gh release create $tag `
            --title $title `
            --notes-file release-notes.md `
            $(if ($isPreRelease) { "--prerelease" }) `
            "$exePath" `
            latest.json

  release-macos:
    runs-on: macos-latest
    needs: release
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm install

      - name: Build universal Tauri app
        run: npm run tauri build -- --target universal-apple-darwin

      - name: Sign DMG and upload to release
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"
          repo="Joey-Farah/Slippi-Ranked-Stats"

          dmg=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          echo "Signing: $dmg"
          npm run tauri -- signer sign --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password "" "$dmg"
          sig="${dmg}.sig"

          dmgName=$(basename "$dmg")
          encoded="${dmgName// /.}"
          url="https://github.com/$repo/releases/download/$tag/$encoded"
          sigContent=$(cat "$sig")

          gh release upload "$tag" "$dmg" "$sig" --clobber

          curl -sL "https://github.com/$repo/releases/download/$tag/latest.json" -o latest.json

          python3 -c "
          import json
          with open('latest.json') as f:
              data = json.load(f)
          entry = {'signature': '''$sigContent''', 'url': '$url'}
          data['platforms']['darwin-universal'] = entry
          data['platforms']['darwin-aarch64'] = entry
          data['platforms']['darwin-x86_64'] = entry
          with open('latest.json', 'w') as f:
              json.dump(data, f, indent=2)
          "

          gh release upload "$tag" latest.json --clobber
